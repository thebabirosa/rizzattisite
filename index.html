
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rizzatti Móveis e Decorações • Transformação completa do seu imóvel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              rizzatti: {
                gold: '#c7a56b',
                'gold-dark': '#b69256',
                bg: '#0b0b0d',
                'bg-soft': '#101014',
                paper: '#fbfaf7',
                'paper-darker': '#f3f1eb',
                text: '#111116',
                'text-soft': '#4b463e',
              }
            },
            fontFamily: {
              sans: ['"DM Sans"', 'sans-serif'],
              serif: ['"Playfair Display"', 'serif'],
            },
            borderRadius: {
              rizzatti: '18px',
              'rizzatti-lg': '26px',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fbfaf7;
        color: #111116;
        scroll-behavior: smooth;
      }
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s ease-out;
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #c7a56b;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b69256;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
